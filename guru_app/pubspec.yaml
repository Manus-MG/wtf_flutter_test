name: guru_app
description: Member-facing app for the WTF Flutter assessment.
publish_to: none
version: 0.0.1+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  wtf_shared:
    path: ../shared
  cloud_firestore: ^5.5.4
  firebase_core: ^3.8.1
  shared_preferences: ^2.3.3
  uuid: ^4.5.1
  hmssdk_flutter: ^1.10.4
  go_router: ^14.6.2
  intl: ^0.19.0
  http: ^1.2.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
